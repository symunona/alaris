# Rate limit zones — defined outside server block (include this in nginx.conf or conf.d)
# If your nginx.conf already has a http{} block, paste only what's inside it there.
limit_req_zone $binary_remote_addr zone=alaris_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=alaris_general:10m rate=30r/s;

server {
    server_name alaris.tmpx.space;

    # Strict rate limit on all API/auth endpoints
    location /api/ {
        limit_req zone=alaris_api burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=alaris_general burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/alaris.tmpx.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alaris.tmpx.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = alaris.tmpx.space) { return 301 https://$host$request_uri; }
    listen 80;
    server_name alaris.tmpx.space;
    return 404;
}
